# Milestone 7D — Tuned stain/color augmentation v2 ERM baseline (ResNet18).
# A STRONGER but controlled, pathology-relevant stain/color augmentation baseline for
# reviewer risk R3 (no *effective* stain-robustness / domain-generalization baseline yet).
# Trains ResNet18 on the SAME cached balanced train subset used by plain-ERM 4A and the 7A
# moderate-augmentation baseline, selecting best by id_val_loss ONLY. ood_val is NEVER used
# for training or model selection — it is read only afterwards (script 20) for
# development-stage comparison. ood_test is never touched. torchvision transforms only; NO
# HED/Macenko, NO GroupDRO/CORAL/DANN, NO MC-dropout/ensemble, NO calibration in this
# milestone. DEVELOPMENT baseline, NOT a paper result.

model:
  backbone_name: resnet18
  pretrained: false
  num_classes: 2

data:
  train_cache: results/cache/balanced_train_pc1000_seed1337_shuf.pt
  id_val_cache: results/cache/balanced_id_val_pc250_seed1337_shuf.pt
  ood_val_cache: results/cache/balanced_ood_val_pc1000_seed1337_noshuf.pt
  batch_size: 32
  num_workers: 0
  seed: 1337

augmentation:
  name: stain_color_aug_v2
  horizontal_flip_p: 0.5
  vertical_flip_p: 0.5
  rotation_degrees: 30
  translate: [0.03, 0.03]
  scale: [0.95, 1.05]
  color_jitter_p: 0.85
  brightness: 0.15
  contrast: 0.30
  saturation: 0.15
  hue: 0.03
  autocontrast_p: 0.25

training:
  epochs: 5
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  seed: 1337

selection:
  metric: id_val_loss
  mode: min

output:
  run_name: exp07d_stainaug_v2_resnet18
  log_csv: results/logs/exp07d_stainaug_v2_resnet18_log.csv
  report_txt: results/logs/exp07d_stainaug_v2_resnet18_train_report.txt
  checkpoint_dir: results/checkpoints/exp07d_stainaug_v2_resnet18
  prediction_dir: results/predictions/exp07d_stainaug_v2_resnet18
  metrics_json: results/metrics/exp07d_stainaug_v2_resnet18/classification_metrics.json
  metrics_csv: results/tables/exp07d_stainaug_v2_resnet18_classification_metrics.csv
